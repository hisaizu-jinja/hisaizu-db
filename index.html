<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久伊豆神社 境内石碑データベース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --c-bg: #f5f2ee; --c-surface: #ffffff; --c-sidebar: #1e1a16;
  --c-ink: #1a1410; --c-muted: #6b6560; --c-border: #d8d0c8;
  --c-accent: #8b3a2a; --c-gold: #9a7830; --c-tag-bg: #f0ece6;
  --sidebar-w: 220px; --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--c-bg); color: var(--c-ink); min-height: 100vh; }

/* ログイン画面 */
.login-screen { display: none; position: fixed; inset: 0; z-index: 1000; background: var(--c-sidebar); align-items: center; justify-content: center; }
.login-screen.show { display: flex; }
.login-box { width: 340px; background: #2a2520; border: 1px solid rgba(154,120,48,0.3); border-radius: 10px; padding: 40px 36px; text-align: center; }
.login-mon { font-size: 32px; color: #d4a853; margin-bottom: 10px; }
.login-title { font-family: 'Noto Serif JP', serif; font-size: 16px; color: #d4a853; margin-bottom: 28px; }
.login-label { display: block; text-align: left; font-size: 11px; color: rgba(212,168,83,0.7); margin-bottom: 6px; }
.login-input { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 11px; color: #fff; margin-bottom: 15px; outline: none; }
.login-btn { width: 100%; background: var(--c-accent); color: #fff; border: none; border-radius: 6px; padding: 12px; cursor: pointer; }
.login-error { color: #e88; font-size: 12px; margin-top: 10px; }

/* メインヘッダー */
.site-header { position: fixed; top: 0; width: 100%; height: var(--header-h); background: var(--c-sidebar); display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #9a7830; z-index: 200; }
.logo { font-family: 'Noto Serif JP', serif; color: #d4a853; font-size: 15px; }
.btn-logout { margin-left: auto; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #ccc; cursor: pointer; padding: 5px 10px; border-radius: 4px; }

/* レイアウト */
.layout { display: flex; margin-top: var(--header-h); }
.sidebar { width: var(--sidebar-w); background: var(--c-sidebar); color: #fff; height: calc(100vh - var(--header-h)); position: sticky; top: var(--header-h); padding: 20px 16px; }
.main { flex: 1; padding: 20px; }
</style>
</head>
<body>

<div class="login-screen show" id="loginScreen">
  <div class="login-box">
    <div class="login-mon">⛩</div>
    <div class="login-title">久伊豆神社 データベース</div>
    <label class="login-label">メールアドレス</label>
    <input type="email" id="loginEmail" class="login-input">
    <label class="login-label">パスワード</label>
    <div style="position:relative">
      <input type="password" id="loginPass" class="login-input">
      <button onclick="togglePass()" type="button" style="position:absolute;right:10px;top:10px;background:none;border:none;color:#aaa;cursor:pointer;">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<header class="site-header">
  <div class="logo">久伊豆神社 石碑データベース</div>
  <button class="btn-logout" onclick="doLogout()">ログアウト</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div style="font-size: 11px; color: #d4a853;">ログイン中:</div>
    <div id="info-user" style="font-size: 11px; color: #888;">---</div>
  </aside>
  <main class="main">
    <div id="results" style="background:#fff; padding:20px; border-radius:8px;">
      ログイン後にデータが表示されます。
    </div>
  </main>
