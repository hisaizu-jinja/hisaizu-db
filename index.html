:root {
  --c-bg: #f5f2ee; --c-surface: #ffffff; --c-sidebar: #1e1a16;
  --c-ink: #1a1410; --c-muted: #6b6560; --c-border: #d8d0c8;

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--c-bg); color: var(--c-ink); min-height: 100vh; }

/* ===== LOGIN SCREEN ===== */
.login-screen { display: none; position: fixed; inset: 0; z-index: 1000; background: var(--c-sidebar); align-items: center; justify-content: center; }
.login-screen.show { display: flex; }
.login-box { width: 340px; background: #2a2520; border: 1px solid rgba(154,120,48,0.3); border-radius: 10px; padding: 40px 36px; text-align: center; }
.login-mon { font-size: 32px; color: #d4a853; margin-bottom: 10px; line-height: 1; }
.login-title { font-family: 'Noto Serif JP', serif; font-size: 16px; color: #d4a853; letter-spacing: 0.1em; margin-bottom: 4px; }
.login-sub { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; margin-bottom: 28px; }
.login-label { display: block; text-align: left; font-size: 11px; color: rgba(212,168,83,0.7); letter-spacing: 0.1em; margin-bottom: 6px; margin-top: 14px; }
.login-input { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 11px 14px; font-size: 15px; font-family: inherit; color: #fff; outline: none; transition: border-color 0.2s; }
.login-input:focus { border-color: #9a7830; }
.login-btn { width: 100%; background: var(--c-accent); color: #fff; border: none; border-radius: 6px; padding: 12px; font-size: 15px; font-family: inherit; cursor: pointer; margin-top: 20px; transition: filter 0.15s; letter-spacing: 0.08em; }
.login-btn:hover { filter: brightness(1.12); }
.login-error { color: #e88; font-size: 12px; margin-top: 10px; min-height: 18px; }

/* ===== HEADER ===== */
.site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--header-h); background: var(--c-sidebar); display: flex; align-items: center; gap: 16px; padding: 0 20px; border-bottom: 2px solid #9a7830; }
.logo { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 700; color: #d4a853; letter-spacing: 0.08em; white-space: nowrap; }
.logo small { display: block; font-size: 10px; font-weight: 400; color: rgba(212,168,83,0.6); letter-spacing: 0.12em; margin-top: 1px; }
.header-search { flex: 1; max-width: 480px; display: flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 0 12px; gap: 8px; }
.header-search:focus-within { background: rgba(255,255,255,0.14); border-color: #9a7830; }
.header-search input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; font-family: inherit; padding: 9px 0; }
.header-search input::placeholder { color: rgba(255,255,255,0.4); }
.header-search svg { color: rgba(255,255,255,0.45); flex-shrink: 0; }
.btn-search { background: var(--c-accent); color: #fff; border: none; border-radius: 5px; padding: 7px 16px; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-search:hover { filter: brightness(1.15); }
.btn-add-header { background: transparent; border: 1px solid rgba(154,120,48,0.6); color: #d4a853; border-radius: 5px; padding: 7px 14px; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-add-header:hover { background: rgba(154,120,48,0.15); }
.btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); border-radius: 5px; padding: 7px 14px; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; margin-left: auto; }
.btn-logout:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

/* ===== LAYOUT ===== */
.layout { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--c-sidebar); min-height: calc(100vh - var(--header-h)); position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; padding: 20px 0 40px; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(212,168,83,0.55); padding: 0 16px; margin-bottom: 6px; }
